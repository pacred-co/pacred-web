# Pacred CI — runs on every PR + every push to dave/main.
#
# Goals (per Part S2 K-10):
#   - Catch lint / typecheck / unit-test / build regressions before manual
#     review — the automated form of the AGENTS.md §11 pre-deploy gate, so a
#     break can't reach `main` just because a dev forgot to run `pnpm verify`.
#   - Free GitHub Actions minutes; matches the local `pnpm` invocations
#     exactly so dev + CI parity is high.
#
# Out of scope this CI:
#   - `pnpm test` (the full chain) includes a placement integration test that
#     reads `.env.local` Supabase URL/key — runs locally only. Use `test:unit`
#     for the env-independent suite that CI exercises here.
#   - The `next start` runtime smoke (curl every route) — needs prod env;
#     stays a manual pre-deploy step per AGENTS.md §11. `pnpm build` below
#     still catches build-time + metadata-typing regressions tsc/lint miss.

name: CI

# Cost-minimised (owner 2026-06-22 · GitHub Actions spending-limit pressure):
#   - runs ONLY on the `main` release gate (PRs into main + pushes to main). The
#     integration trunk `dave-pacred` + teammate branches rely on the local
#     `pnpm verify` + `pnpm build` discipline (AGENTS.md §11) before every push, so
#     gating every trunk push too would just burn minutes. Nothing reaches `main`
#     without this job.
#   - `paths-ignore` skips doc-only changes (the frequent docs/learnings/memory/
#     worklog/migration-note commits don't need lint/tsc/build).
#   - draft PRs are skipped; `concurrency` cancels superseded runs.
on:
  pull_request:
    branches: [main]
    paths-ignore: ["**/*.md", "docs/**"]
  push:
    branches: [main]
    paths-ignore: ["**/*.md", "docs/**"]

# Cancel in-flight runs when a new commit lands on the same branch/PR
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint + typecheck + unit tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip draft PRs (still runs on every push to main + ready PRs).
    if: github.event_name == 'push' || github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        # No `version` here — pnpm/action-setup@v4 reads it from the
        # `packageManager` field in package.json. Specifying both causes
        # ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        # `pnpm typecheck` is `node scripts/tsc-check.mjs` which sets
        # NODE_OPTIONS=--max-old-space-size=8192 cross-platform before
        # exec'ing tsc. Default 2 GB heap OOMs since the camelCase
        # batches (Wave 25 #194 + batch 2a) + ปอน's MOMO isolated layer
        # landed — see docs/learnings/ci-and-deploy-gotchas.md.
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Docs + env audit
        # Verifies all markdown local links resolve + every process.env.X
        # reference in code is documented in .env.example. Catches doc rot
        # before manual review. Both scripts exit 0 when healthy.
        # NOTE: scripted as `audit:all` (not `audit`) because `pnpm audit`
        # is a built-in security advisory command that wins the namespace.
        run: pnpm audit:all

      - name: Build
        # `next build` — catches build-only regressions that lint + tsc miss
        # (route-config typing, metadata exports, server/client boundary
        # errors). Runs without `.env.local`: Supabase keys fall back to
        # placeholders at build time, and no route is statically rendered
        # in a way that needs a live DB. This is the closest CI gets to the
        # AGENTS.md §11 deploy gate without a prod environment.
        # Same 8 GB heap as Typecheck — `next build` runs tsc internally.
        run: pnpm build
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
